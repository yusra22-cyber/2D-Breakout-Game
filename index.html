<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Breakout Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">

    <div class="flex flex-col items-center">
        <h1 class="text-white text-3xl font-bold mb-4">Breakout Game</h1>
        <canvas id="gameCanvas" class="border-4 border-white rounded-md" width="480" height="320"></canvas>
        <div class="flex justify-between w-96 mt-4 text-white">
            <span id="score">Score: 0</span>
            <span id="lives">Lives: 3</span>
        </div>
    </div>

    <script>
      const game=document.getElementById("gameCanvas")

      let ball={
        x:240,  //start horizontal position of ball
        y:290,  //start vertical position of ball
        dx:2,     ///speed
        dy:-2,      ////speed
        radius:8,
      }

      let paddle={
         x:200, ////start horizontal position
         width:75,
         height:10,
         speed:7,
         moveLeft:false,
         moveRight:false,
      }

      let bricks=[]
      for(let i=0; i<7; i++){
          bricks[i]=[]
          for(let j=0; j<5; j++){
            bricks[i][j]={x:0,y:0,status:1}
          }
      }

      let score=0
      let lives=3

      ////////Paddle Movement

      document.addEventListener("keydown",(e)=>{
            if(e.key==="ArrowLeft") paddle.moveLeft=true
            if(e.key==="ArrowRight") paddle.moveRight=true
      })
      document.addEventListener("keyup",(e)=>{
           if(e.key==="ArrowLeft") paddle.moveLeft=false
           if(e.key==="ArrowRight") paddle.moveRight=false
      })

      function movePaddle(){
        if(paddle.moveLeft && paddle.x > 0){
            paddle.x=paddle.x - paddle.speed
        }

        if(paddle.moveRight && paddle.x + paddle.width < game.width){
            paddle.x=paddle.x + paddle.speed
        }
      }

      ////////ball movement

      function moveBall(){
            ball.x=ball.x+ball.dx
            ball.y=ball.y+ball.dy

            if(ball.x+ball.radius > game.width || ball.x - ball.radius < 0){
                ball.dx = -ball.dx
            }
            if(ball.y - ball.radius < 0){
                ball.dy = -ball.dy
            }

            if(ball.y + ball.radius > game.height - paddle.height &&
                ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                ball.dy = -ball.dy
            }

            if(ball.y + ball.radius > game.height){
                lives--
                if(lives===0){
                    alert("Game over")
                    location.reload()
                }else{
                    resetball()
                }
            }

            for(let i=0; i<7; i++){
              for(let j=0; j<5; j++){
                let b=bricks[i][j]
                if(b.status===1){
                    if(ball.x > b.x && ball.x < b.x +55 && ball.y > b.y && ball.y < b.y +20){
                        ball.dy=-ball.dy
                        b.status=0
                        score++
                        document.getElementById("score").innerText = "Score: " + score
                        if(score===7*5){
                            alert("You are win")
                            location.reload()
                        }
                    }
                }
              }
            }
      }

      function resetball() {
             ball.x = game.width / 2
             ball.y = game.height - 30
             ball.dx = 2
             ball.dy = -2
             paddle.x = (game.width - paddle.width)/2
             document.getElementById("lives").innerText = "Lives: " + lives
            }

     const ctx=game.getContext("2d")

     function drawBall(){
        ctx.beginPath()
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2)
        ctx.fillStyle = "#EF4444"
        ctx.fill()
        ctx.closePath()
     }
    function drawPaddle(){
        ctx.beginPath()
        ctx.rect(paddle.x, game.height-paddle.height, paddle.width, paddle.height)
        ctx.fillStyle="#10B981"
        ctx.fill()
        ctx.closePath()
    }

    function drawbricks(){
        for(let i=0; i<7; i++){
            for(let j=0; j<5; j++){
                if(bricks[i][j].status===1){
                    let BrickX=i*(55+10)+30
                    let BrickY=j*(20+10)+30
                    bricks[i][j].x=BrickX
                    bricks[i][j].y=BrickY
                    ctx.beginPath()
                    ctx.rect(BrickX,BrickY,55,20)
                    ctx.fillStyle="#3B82F6"
                    ctx.fill()
                    ctx.closePath()
                }
            }
        }
    }
     
     function Game(){
        ctx.clearRect(0,0,game.width, game.height)

        drawbricks()
        drawBall()
        drawPaddle()

        moveBall()
        movePaddle()

        requestAnimationFrame(Game)
     }

     Game()
    </script>
</body>
</html>
